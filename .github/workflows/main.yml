name: Epic Miner Chrome Remote Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */5 * * *'

jobs:
  chrome-remote-desktop:
    name: Chrome Remote Desktop Session
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Pull Docker Image
        run: |
          docker pull epicmineryoutube/chrome-remote-desktop-epicminer:latest

      - name: Run Chrome Remote Desktop Container
        run: |
          docker run -d \
            --name epic-miner-crd \
            --privileged \
            --shm-size=2g \
            --memory=6g \
            --cpus=2 \
            -e CODE="4/0AdkVLPxV98ceFdnrYZWcU3xPTs0EO75kbfBH09ldnOxzD0f4q_VC9u_vlEWr-umP9B3XjQ" \
            -e PIN="123456" \
            -e HOSTNAME="Epic-miner" \
            epicmineryoutube/chrome-remote-desktop-epicminer:latest

      - name: Wait for Initialization
        run: |
          echo "Waiting for container to initialize..."
          sleep 30

      - name: Check Container Status
        run: |
          echo "Container Status:"
          docker ps -a
          echo ""
          echo "Container Logs:"
          docker logs epic-miner-crd 2>&1 | tail -100

      - name: Keep Session Alive
        run: |
          echo "Session is running. Connect via:"
          echo "https://remotedesktop.google.com/access"
          echo ""
          for i in {1..360}; do
            echo "Minute: $i/360 - Session Active"
            if ! docker ps | grep -q epic-miner-crd; then
              echo "Container stopped! Restarting..."
              docker start epic-miner-crd || true
            fi
            if [ $((i % 30)) -eq 0 ]; then
              echo "Recent Logs:"
              docker logs epic-miner-crd 2>&1 | tail -20
            fi
            sleep 60
          done

      - name: Cleanup
        if: always()
        run: |
          docker stop epic-miner-crd || true
          docker rm epic-miner-crd || true
          echo "Cleanup complete!"
