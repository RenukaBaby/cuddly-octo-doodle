name: 🚀 Chrome Remote Desktop - Epic Miner FIXED

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'

jobs:
  deploy:
    name: 🖥️ Deploy Chrome Remote Desktop
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 🖥️ Display System Info
        run: |
          echo "========================================="
          echo "         EPIC MINER - SYSTEM INFO        "
          echo "========================================="
          echo "OS:       $(uname -a)"
          echo "CPU:      $(nproc) cores"
          echo "RAM:      $(free -h | awk '/^Mem:/ {print $2}')"
          echo "Disk:     $(df -h / | awk 'NR==2 {print $4}') free"
          echo "Docker:   $(docker --version)"
          echo "========================================="

      - name: 🔧 Install Chrome Remote Desktop
        run: |
          echo "========================================="
          echo "   INSTALLING CHROME REMOTE DESKTOP      "
          echo "========================================="

          # Install dependencies
          sudo apt-get update -y
          sudo apt-get install -y \
            curl \
            wget \
            dpkg \
            xvfb \
            x11vnc \
            xfce4 \
            xfce4-goodies \
            dbus-x11 \
            xbase-clients \
            python3 \
            python3-pip \
            net-tools \
            htop \
            supervisor

          # Download and install Chrome Remote Desktop
          wget -q https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
          sudo dpkg -i chrome-remote-desktop_current_amd64.deb || sudo apt-get install -f -y
          sudo dpkg -i chrome-remote-desktop_current_amd64.deb
          echo "✅ Chrome Remote Desktop installed!"

          # Install Google Chrome
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y
          sudo dpkg -i google-chrome-stable_current_amd64.deb
          echo "✅ Google Chrome installed!"

      - name: 👤 Create User & Configure
        run: |
          echo "========================================="
          echo "   CREATING USER & CONFIGURING CRD       "
          echo "========================================="

          # Create user
          sudo useradd -m -s /bin/bash myuser 2>/dev/null || true
          echo "myuser:mypassword" | sudo chpasswd
          sudo usermod -aG sudo myuser
          sudo usermod -aG chrome-remote-desktop myuser

          # Create required directories
          sudo mkdir -p /home/myuser/.config/chrome-remote-desktop
          sudo mkdir -p /home/myuser/.chrome-remote-desktop-session
          sudo chown -R myuser:myuser /home/myuser/

          echo "✅ User created and configured!"

      - name: 🖥️ Setup Xfce Desktop Session
        run: |
          echo "========================================="
          echo "   SETTING UP XFCE DESKTOP SESSION       "
          echo "========================================="

          # Create Xfce session script for CRD
          sudo tee /home/myuser/.chrome-remote-desktop-session > /dev/null << 'XFCE_SESSION'
          #!/bin/bash
          exec /usr/bin/xfce4-session
          XFCE_SESSION

          sudo chmod +x /home/myuser/.chrome-remote-desktop-session
          sudo chown myuser:myuser /home/myuser/.chrome-remote-desktop-session

          # Also set via environment
          echo "CHROME_REMOTE_DESKTOP_DEFAULT_DESKTOP_SIZES=1920x1080" | sudo tee -a /etc/environment

          echo "✅ Xfce session configured!"

      - name: 🔑 Register Chrome Remote Desktop Host
        run: |
          echo "========================================="
          echo "   REGISTERING CRD HOST WITH TOKEN       "
          echo "========================================="

          # Extract and use the token directly
          CODE="4/0AeoWuM8BEOlFbNu7oIUauV3R9EKH73gQX4La2v0OgJQTnQSb38l_K0EGU1uSzSd5imoEDA"
          REDIRECT_URL="https://remotedesktop.google.com/_/oauthredirect"
          PIN="123456"
          HOSTNAME="Epic-miner"

          echo "Using CODE: ${CODE:0:20}... (truncated for security)"
          echo "Hostname: $HOSTNAME"
          echo "PIN: $PIN"

          # Run the exact command format that works
          sudo -u myuser bash -c "
            export DISPLAY=:20
            export HOME=/home/myuser
            export USER=myuser

            DISPLAY=:20 /opt/google/chrome-remote-desktop/start-host \
              --code=\"$CODE\" \
              --redirect-url=\"$REDIRECT_URL\" \
              --name=\"$HOSTNAME\" \
              --pin=\"$PIN\"
          " && echo "✅ CRD Host registered successfully!" || echo "⚠️ Registration attempt completed"

          # Verify host config was created
          echo ""
          echo "Checking host config files..."
          sudo ls -la /home/myuser/.config/chrome-remote-desktop/ 2>/dev/null || echo "Directory empty or not found"

      - name: ▶️ Start Chrome Remote Desktop Service
        run: |
          echo "========================================="
          echo "   STARTING CRD SERVICE                  "
          echo "========================================="

          # Start the service
          sudo -u myuser bash -c "
            export HOME=/home/myuser
            export USER=myuser
            /opt/google/chrome-remote-desktop/chrome-remote-desktop --start
          " && echo "✅ CRD service started!" || echo "⚠️ Service start attempted"

          # Also try systemd if available
          sudo systemctl start chrome-remote-desktop@myuser 2>/dev/null || true

          sleep 10

          # Check if running
          echo ""
          echo "Checking CRD processes..."
          ps aux | grep -i "chrome-remote" | grep -v grep || echo "No CRD processes found yet"

      - name: ✅ Verify Setup
        run: |
          echo "========================================="
          echo "         VERIFICATION CHECK              "
          echo "========================================="

          sleep 15

          echo "📁 CRD Config files:"
          sudo ls -la /home/myuser/.config/chrome-remote-desktop/ 2>/dev/null || echo "No config files found"

          echo ""
          echo "🔄 Running processes:"
          ps aux | grep -i "chrome\|remote\|Xvfb\|xfce" | grep -v grep || echo "No processes found"

          echo ""
          echo "🌐 Network connections:"
          netstat -tlnp 2>/dev/null | grep -i "chrome\|5900\|443" || true

          echo ""
          echo "📋 CRD Logs:"
          sudo cat /tmp/chrome_remote_desktop_* 2>/dev/null | tail -20 || true
          sudo journalctl -u chrome-remote-desktop@myuser --no-pager -n 20 2>/dev/null || true

      - name: 💓 Health Check & Keep Alive
        run: |
          echo "========================================="
          echo "   KEEPING SESSION ALIVE - MONITORING    "
          echo "========================================="

          START_TIME=$(date +%s)
          MAX_RUNTIME=21000
          CHECK_INTERVAL=60
          RESTART_COUNT=0

          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            REMAINING=$((MAX_RUNTIME - ELAPSED))

            if [ $ELAPSED -ge $MAX_RUNTIME ]; then
              echo "⏰ Max runtime reached. Exiting gracefully..."
              break
            fi

            # Check if CRD is still running
            CRD_RUNNING=$(ps aux | grep -i "chrome-remote-desktop" | grep -v grep | wc -l)

            if [ "$CRD_RUNNING" -eq "0" ]; then
              RESTART_COUNT=$((RESTART_COUNT + 1))
              echo "⚠️ CRD stopped! Attempting restart #$RESTART_COUNT..."

              sudo -u myuser bash -c "
                export HOME=/home/myuser
                export USER=myuser
                /opt/google/chrome-remote-desktop/chrome-remote-desktop --start
              " 2>/dev/null || true

              sudo systemctl restart chrome-remote-desktop@myuser 2>/dev/null || true
              sleep 10
            fi

            if [ $((ELAPSED % 300)) -lt $CHECK_INTERVAL ]; then
              echo "─────────────────────────────────────────"
              echo "⏱️  Elapsed:    $(($ELAPSED / 60)) minutes"
              echo "⏳  Remaining:  $(($REMAINING / 60)) minutes"
              echo "🔄  CRD Procs:  $CRD_RUNNING"
              echo "🔁  Restarts:   $RESTART_COUNT"
              echo "💾  Memory:     $(free -h | awk '/^Mem:/ {print $3 "/" $2}')"
              echo "🖥️  CPU Load:   $(cat /proc/loadavg | awk '{print $1}')"
              echo "─────────────────────────────────────────"
            fi

            sleep $CHECK_INTERVAL
          done

      - name: 🧹 Final Cleanup
        if: always()
        run: |
          echo "========================================="
          echo "         FINAL STATUS REPORT             "
          echo "========================================="
          ps aux | grep -i chrome | grep -v grep || true
          sudo journalctl -u chrome-remote-desktop@myuser --no-pager -n 20 2>/dev/null || true
          echo ""
          echo "✅ Session completed!"
          echo "🔄 Will auto-restart on next schedule or manual trigger"
