name: 🚀 Chrome Remote Desktop - Epic Miner ULTIMATE FIX

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'

jobs:
  deploy:
    name: 🖥️ Deploy Chrome Remote Desktop
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 🖥️ Display System Info
        run: |
          echo "========================================="
          echo "         EPIC MINER - SYSTEM INFO        "
          echo "========================================="
          echo "OS:       $(uname -a)"
          echo "CPU:      $(nproc) cores"
          echo "RAM:      $(free -h | awk '/^Mem:/ {print $2}')"
          echo "Disk:     $(df -h / | awk 'NR==2 {print $4}') free"
          echo "Docker:   $(docker --version)"
          echo "========================================="

      - name: 🔧 Install Dependencies
        run: |
          echo "========================================="
          echo "   INSTALLING DEPENDENCIES               "
          echo "========================================="
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            curl \
            wget \
            dpkg \
            xvfb \
            xfce4 \
            xfce4-goodies \
            dbus-x11 \
            x11-xserver-utils \
            xbase-clients \
            python3 \
            net-tools \
            htop \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2
          echo "✅ Dependencies installed!"

      - name: 🖥️ Install Chrome Remote Desktop
        run: |
          echo "========================================="
          echo "   INSTALLING CHROME REMOTE DESKTOP      "
          echo "========================================="

          # Download CRD
          wget -q https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb -O /tmp/crd.deb

          # Install CRD properly
          sudo dpkg -i /tmp/crd.deb 2>/dev/null || true
          sudo apt-get install -f -y
          sudo dpkg -i /tmp/crd.deb
          sudo apt-get install -f -y

          # Verify installation
          echo ""
          echo "Verifying CRD installation..."
          which /opt/google/chrome-remote-desktop/chrome-remote-desktop && echo "✅ CRD binary found!" || echo "❌ CRD binary NOT found!"
          which /opt/google/chrome-remote-desktop/start-host && echo "✅ start-host found!" || echo "❌ start-host NOT found!"

          # Verify group created
          echo ""
          echo "Checking groups..."
          getent group chrome-remote-desktop && echo "✅ Group exists!" || echo "❌ Group NOT found - creating manually..."
          sudo groupadd -f chrome-remote-desktop
          getent group chrome-remote-desktop && echo "✅ Group confirmed!"

          echo ""
          echo "📋 CRD Files:"
          ls -la /opt/google/chrome-remote-desktop/ 2>/dev/null || echo "Directory not found"

      - name: 🌐 Install Google Chrome
        run: |
          echo "========================================="
          echo "   INSTALLING GOOGLE CHROME              "
          echo "========================================="
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -O /tmp/chrome.deb
          sudo dpkg -i /tmp/chrome.deb 2>/dev/null || true
          sudo apt-get install -f -y
          sudo dpkg -i /tmp/chrome.deb
          google-chrome --version && echo "✅ Chrome installed!" || echo "❌ Chrome install failed"

      - name: 👤 Create User & Configure
        run: |
          echo "========================================="
          echo "   CREATING USER & CONFIGURING CRD       "
          echo "========================================="

          # Ensure group exists before adding user
          sudo groupadd -f chrome-remote-desktop
          echo "✅ Group ready: $(getent group chrome-remote-desktop)"

          # Create user
          sudo useradd -m -s /bin/bash myuser 2>/dev/null || echo "User already exists"
          echo "myuser:mypassword" | sudo chpasswd
          sudo usermod -aG sudo myuser
          sudo usermod -aG chrome-remote-desktop myuser
          echo "✅ User configured: $(id myuser)"

          # Create required directories
          sudo mkdir -p /home/myuser/.config/chrome-remote-desktop
          sudo mkdir -p /home/myuser/.cache
          sudo mkdir -p /home/myuser/.local/share

          # Set correct permissions
          sudo chown -R myuser:myuser /home/myuser/
          sudo chmod 700 /home/myuser/.config/chrome-remote-desktop

          echo "✅ Directories created and permissions set!"

      - name: 🖥️ Setup Xfce Desktop Session
        run: |
          echo "========================================="
          echo "   SETTING UP XFCE DESKTOP SESSION       "
          echo "========================================="

          # Create CRD session script
          sudo tee /home/myuser/.chrome-remote-desktop-session > /dev/null << 'EOF'
          #!/bin/bash
          export XDG_SESSION_TYPE=x11
          export XDG_CURRENT_DESKTOP=XFCE
          startxfce4 &
          EOF

          sudo chmod +x /home/myuser/.chrome-remote-desktop-session
          sudo chown myuser:myuser /home/myuser/.chrome-remote-desktop-session

          # Create .xsession as backup
          sudo tee /home/myuser/.xsession > /dev/null << 'EOF'
          #!/bin/bash
          startxfce4
          EOF
          sudo chmod +x /home/myuser/.xsession
          sudo chown myuser:myuser /home/myuser/.xsession

          echo "✅ Xfce session configured!"

      - name: 🔑 Register Chrome Remote Desktop
        run: |
          echo "========================================="
          echo "   REGISTERING CRD HOST                  "
          echo "========================================="

          CODE="4/0AeoWuM95-qrj9Reixom4gA71jWmNHViuu0ls9VcdHwvQIN_dWm2zhzurIuPtQLuU23vWyA"
          REDIRECT_URL="https://remotedesktop.google.com/_/oauthredirect"
          PIN="123456"
          HOSTNAME="Epic-miner"

          echo "Code prefix: ${CODE:0:30}..."
          echo "Hostname: $HOSTNAME"

          # Method 1: Using start-host
          echo ""
          echo "Trying Method 1: start-host..."
          sudo -u myuser bash << ENDBASH
          export HOME=/home/myuser
          export USER=myuser
          export DISPLAY=:20
          export XDG_RUNTIME_DIR=/run/user/\$(id -u)
          sudo mkdir -p \$XDG_RUNTIME_DIR 2>/dev/null || true
          sudo chown myuser:myuser \$XDG_RUNTIME_DIR 2>/dev/null || true

          DISPLAY=:20 /opt/google/chrome-remote-desktop/start-host \
            --code="$CODE" \
            --redirect-url="$REDIRECT_URL" \
            --name="$HOSTNAME" \
            --pin="$PIN" 2>&1

          EXIT_CODE=\$?
          echo "Exit code: \$EXIT_CODE"
          ENDBASH

          echo ""
          echo "📁 Config files after registration:"
          sudo ls -la /home/myuser/.config/chrome-remote-desktop/ 2>/dev/null || echo "No files found"

      - name: ▶️ Start CRD Service
        run: |
          echo "========================================="
          echo "   STARTING CRD SERVICE                  "
          echo "========================================="

          # Method 1: Direct start
          sudo -u myuser bash << 'ENDBASH'
          export HOME=/home/myuser
          export USER=myuser
          /opt/google/chrome-remote-desktop/chrome-remote-desktop --start 2>&1 || true
          ENDBASH

          sleep 5

          # Method 2: Systemd
          sudo systemctl enable chrome-remote-desktop@myuser 2>/dev/null || true
          sudo systemctl start chrome-remote-desktop@myuser 2>/dev/null || true

          sleep 10

          echo ""
          echo "🔄 CRD Processes:"
          ps aux | grep -i "chrome-remote\|Xvfb\|xfce" | grep -v grep || echo "No processes found yet"

          echo ""
          echo "📋 Systemd status:"
          sudo systemctl status chrome-remote-desktop@myuser --no-pager 2>/dev/null || true

      - name: ✅ Verify & Show Status
        run: |
          echo "========================================="
          echo "         VERIFICATION CHECK              "
          echo "========================================="

          sleep 15

          echo "📁 CRD Config files:"
          sudo ls -la /home/myuser/.config/chrome-remote-desktop/ 2>/dev/null || echo "No config files"

          echo ""
          echo "📄 Host config content:"
          sudo cat /home/myuser/.config/chrome-remote-desktop/host*.json 2>/dev/null || echo "No host config found"

          echo ""
          echo "🔄 All running processes:"
          ps aux | grep -i "chrome\|remote\|Xvfb\|xfce" | grep -v grep || echo "No processes"

          echo ""
          echo "📋 CRD Logs:"
          sudo cat /tmp/chrome_remote_desktop_* 2>/dev/null | tail -30 || true
          sudo journalctl -u chrome-remote-desktop@myuser --no-pager -n 30 2>/dev/null || true

          echo ""
          echo "========================================="
          echo "   HOW TO CONNECT                        "
          echo "========================================="
          echo "1. Go to: https://remotedesktop.google.com/access"
          echo "2. Look for: Epic-miner"
          echo "3. PIN: 123456"
          echo "========================================="

      - name: 💓 Health Check & Keep Alive
        run: |
          echo "========================================="
          echo "   KEEPING SESSION ALIVE - MONITORING    "
          echo "========================================="

          START_TIME=$(date +%s)
          MAX_RUNTIME=21000
          CHECK_INTERVAL=60
          RESTART_COUNT=0

          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            REMAINING=$((MAX_RUNTIME - ELAPSED))

            if [ $ELAPSED -ge $MAX_RUNTIME ]; then
              echo "⏰ Max runtime reached. Exiting gracefully..."
              break
            fi

            # Check CRD process count
            CRD_RUNNING=$(ps aux | grep -i "chrome-remote-desktop" | grep -v grep | wc -l)

            if [ "$CRD_RUNNING" -eq "0" ]; then
              RESTART_COUNT=$((RESTART_COUNT + 1))
              echo "⚠️ $(date): CRD stopped! Restart #$RESTART_COUNT..."

              sudo -u myuser bash << 'ENDBASH'
              export HOME=/home/myuser
              export USER=myuser
              /opt/google/chrome-remote-desktop/chrome-remote-desktop --start 2>/dev/null || true
              ENDBASH

              sudo systemctl restart chrome-remote-desktop@myuser 2>/dev/null || true
              sleep 15
            fi

            if [ $((ELAPSED % 300)) -lt $CHECK_INTERVAL ]; then
              echo "─────────────────────────────────────────"
              echo "🕐 Time:       $(date)"
              echo "⏱️  Elapsed:   $(($ELAPSED / 60)) min"
              echo "⏳  Remaining: $(($REMAINING / 60)) min"
              echo "🔄  CRD Procs: $CRD_RUNNING"
              echo "🔁  Restarts:  $RESTART_COUNT"
              echo "💾  Memory:    $(free -h | awk '/^Mem:/ {print $3 "/" $2}')"
              echo "🖥️  CPU Load:  $(cat /proc/loadavg | awk '{print $1}')"
              echo "─────────────────────────────────────────"
            fi

            sleep $CHECK_INTERVAL
          done

      - name: 🧹 Final Cleanup
        if: always()
        run: |
          echo "========================================="
          echo "         FINAL STATUS REPORT             "
          echo "========================================="
          ps aux | grep -i chrome | grep -v grep || true
          sudo journalctl -u chrome-remote-desktop@myuser --no-pager -n 20 2>/dev/null || true
          echo "✅ Session completed!"
          echo "🔄 Auto-restart on next schedule"
